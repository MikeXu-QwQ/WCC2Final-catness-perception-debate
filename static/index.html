<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Catness Perception Debate</title>

<!-- 🎬 Cartoon Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Fredoka:wght@400;600&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    text-align: center;
    color: white;
    font-family: 'Fredoka', sans-serif;
    background: url("/static/background.png") no-repeat center center fixed;
    background-size: cover;
}

/* ✅ title */
h1 {
    margin-top: 40px;
    font-size: 52px;
    font-family: 'Luckiest Guy', cursive;
    letter-spacing: 2px;
    text-shadow:
        4px 4px 0 rgba(0,0,0,0.7),
        0 0 15px rgba(255,255,255,0.3);
}

/*  upload
.upload-section {
    margin: 30px;
}

/*  2 */
#imageInput {
    display: none;
}

/*  button */
button {
    padding: 12px 28px;
    font-size: 18px;
    border-radius: 40px;
    border: none;
    background: linear-gradient(45deg, #f6cfab, #75a8ff);
    color: white;
    cursor: pointer;
    font-family: 'Fredoka', sans-serif;
    margin: 0 10px;
    transition: 0.3s ease;
}

button:hover {
    transform: scale(1.1);
}

/*  pic */
img {
    margin-top: 25px;
    max-width: 300px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.6);
}

/* talk */
#dialogueBox {
    max-width: 750px;
    margin: 40px auto;
}

/* bubble */
.bubble {
    padding: 18px 24px;
    border-radius: 30px;
    margin: 18px 0;
    max-width: 80%;
    position: relative;
    font-size: 19px;
    backdrop-filter: blur(8px);
    background: rgba(0,0,0,0.6);
    color: white;
    animation: fadeIn 0.6s ease-in-out;
}

/* bubbleres */
.resnet-bubble {
    background: linear-gradient(90deg, rgba(79,172,254,0.9), rgba(0,242,254,0.9));
    text-align: left;
}

/* bubble vit */
.vit-bubble {
    background: linear-gradient(90deg, rgba(251, 225, 147, 0.9), rgba(245, 153, 87, 0.9));
    text-align: left;
    margin-left: auto;
}

/* winner ui */
#winnerBox {
    font-size: 34px;
    font-family: 'Luckiest Guy', cursive;
    margin-top: 35px;
    text-shadow: 3px 3px 0 black;
    animation: pop 0.5s ease;
}

/* animation */
@keyframes fadeIn {
    from {opacity:0; transform:translateY(10px);}
    to {opacity:1; transform:translateY(0);}
}

@keyframes pop {
    from { transform: scale(0.8); }
    to { transform: scale(1); }
}

</style>
</head>

<body>

<h1>Catness Perception Debate</h1>

<div class="upload-section">
    <input type="file" id="imageInput" accept="image/*">
    <button id="uploadBtn">Upload File</button>
    <button onclick="analyzeImage()">Analyze</button>
</div>

<img id="preview"/>

<div id="dialogueBox"></div>
<div id="winnerBox"></div>

<!-- 🎵 Music -->
<audio id="bgMusic" loop>
<source src="/static/bgm.mp3" type="audio/mpeg">
</audio>

<audio id="successSound">
<source src="/static/success.mp3" type="audio/mpeg">
</audio>

<script src="/static/sketch.js"></script>

<script>
/* ✅ 让 Upload 按钮触发隐藏 input */
document.getElementById("uploadBtn").addEventListener("click", () => {
    document.getElementById("imageInput").click();
});
</script>

</body>
</html>
